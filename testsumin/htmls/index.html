<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 오목 게임</title>
    <style>
        :root {
            --board-color: #e3bc7a;
            --line-color: #4a3621;
            --black-stone: #222;
            --white-stone: #f0f0f0;
            --bg-color: #f5f5f7;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .status-panel {
            text-align: center;
        }

        .status-panel h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
        }

        .turn-indicator {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 30px;
            background: #eee;
        }

        .stone-preview {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
        }

        .stone-preview.black { background: var(--black-stone); }
        .stone-preview.white { 
            background: var(--white-stone); 
            border: 1px solid #ccc;
        }

        /* 보드 스타일 */
        #board {
            display: grid;
            grid-template-columns: repeat(15, 1fr);
            grid-template-rows: repeat(15, 1fr);
            width: min(90vw, 500px);
            height: min(90vw, 500px);
            background-color: var(--board-color);
            position: relative;
            border: 2px solid var(--line-color);
            padding: 0;
            cursor: pointer;
        }

        .cell {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 십자선 그리기 */
        .cell::before, .cell::after {
            content: '';
            position: absolute;
            background-color: var(--line-color);
            z-index: 1;
        }

        /* 가로선 */
        .cell::before {
            width: 100%;
            height: 1px;
            top: 50%;
        }

        /* 세로선 */
        .cell::after {
            width: 1px;
            height: 100%;
            left: 50%;
        }

        /* 돌 스타일 */
        .stone {
            width: 85%;
            height: 85%;
            border-radius: 50%;
            z-index: 2;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            transition: transform 0.1s ease-out;
        }

        .stone.black {
            background: radial-gradient(circle at 30% 30%, #444, #000);
        }

        .stone.white {
            background: radial-gradient(circle at 30% 30%, #fff, #ddd);
            border: 1px solid #ccc;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            background-color: #007aff;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #0056b3;
        }

        button.secondary {
            background-color: #8e8e93;
        }

        /* 모달 알림 */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<div class="game-container">
    <div class="status-panel">
        <h1>오목 (Gomoku)</h1>
        <div class="turn-indicator" id="turn-display">
            <div class="stone-preview black" id="turn-stone"></div>
            <span id="turn-text">흑돌 차례</span>
        </div>
    </div>

    <div id="board"></div>

    <div class="controls">
        <button onclick="resetGame()">다시 시작</button>
    </div>
</div>

<div id="winModal" class="modal">
    <div class="modal-content">
        <h2 id="winMessage">흑돌이 승리했습니다!</h2>
        <button onclick="closeModal()">확인</button>
    </div>
</div>

<script>
    const BOARD_SIZE = 15;
    let currentPlayer = 'black';
    let gameState = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(null));
    let isGameOver = false;

    const boardElement = document.getElementById('board');
    const turnText = document.getElementById('turn-text');
    const turnStone = document.getElementById('turn-stone');
    const winModal = document.getElementById('winModal');
    const winMessage = document.getElementById('winMessage');

    // 보드 초기화
    function createBoard() {
        boardElement.innerHTML = '';
        for (let r = 0; r < BOARD_SIZE; r++) {
            for (let c = 0; c < BOARD_SIZE; c++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.row = r;
                cell.dataset.col = c;
                cell.onclick = () => handleMove(r, c);
                boardElement.appendChild(cell);
            }
        }
    }

    // 착수 처리
    function handleMove(r, c) {
        if (gameState[r][c] || isGameOver) return;

        // 상태 업데이트
        gameState[r][c] = currentPlayer;
        renderStone(r, c, currentPlayer);

        // 승리 확인
        if (checkWin(r, c)) {
            showWinner(currentPlayer);
            isGameOver = true;
            return;
        }

        // 플레이어 교체
        currentPlayer = (currentPlayer === 'black') ? 'white' : 'black';
        updateTurnDisplay();
    }

    // 화면에 돌 그리기
    function renderStone(r, c, player) {
        const index = r * BOARD_SIZE + c;
        const cell = boardElement.children[index];
        const stone = document.createElement('div');
        stone.className = `stone ${player}`;
        cell.appendChild(stone);
    }

    function updateTurnDisplay() {
        if (currentPlayer === 'black') {
            turnText.innerText = "흑돌 차례";
            turnStone.className = "stone-preview black";
        } else {
            turnText.innerText = "백돌 차례";
            turnStone.className = "stone-preview white";
        }
    }

    // 승리 조건 체크 (5목)
    function checkWin(r, c) {
        const directions = [
            [[0, 1], [0, -1]], // 가로
            [[1, 0], [-1, 0]], // 세로
            [[1, 1], [-1, -1]], // 대각선 \
            [[1, -1], [-1, 1]]  // 대각선 /
        ];

        for (const dir of directions) {
            let count = 1;
            for (const [dr, dc] of dir) {
                let nr = r + dr;
                let nc = c + dc;
                while (nr >= 0 && nr < BOARD_SIZE && nc >= 0 && nc < BOARD_SIZE && gameState[nr][nc] === currentPlayer) {
                    count++;
                    nr += dr;
                    nc += dc;
                }
            }
            if (count >= 5) return true;
        }
        return false;
    }

    function showWinner(player) {
        const name = (player === 'black') ? "흑돌" : "백돌";
        winMessage.innerText = `${name}이 승리했습니다!`;
        winModal.style.display = 'flex';
    }

    function closeModal() {
        winModal.style.display = 'none';
        resetGame();
    }

    function resetGame() {
        gameState = Array(BOARD_SIZE).fill().map(() => Array(BOARD_SIZE).fill(null));
        currentPlayer = 'black';
        isGameOver = false;
        updateTurnDisplay();
        createBoard();
    }

    // 초기 실행
    window.onload = createBoard;

</script>

</body>
</html>
